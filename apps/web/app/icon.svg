<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="diceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Dice Body -->
  <rect x="12" y="12" width="76" height="76" rx="20" fill="url(#diceGrad)" filter="url(#shadow)" stroke="#4c1d95" stroke-width="2"/>
  
  <!-- Dots (showing 5) -->
  <circle cx="32" cy="32" r="9" fill="#ffffff" />
  <circle cx="68" cy="32" r="9" fill="#ffffff" />
  <circle cx="50" cy="50" r="9" fill="#ffffff" />
  <circle cx="32" cy="68" r="9" fill="#ffffff" />
  <circle cx="68" cy="68" r="9" fill="#ffffff" />
</svg>
